enabled: false
url: "http://127.0.0.1:8200"
auth_method: token
# REM-031: AppRole credentials — uncomment and set to enable AppRole auth
# auth_method: approle       # switch from token to approle for production
# role_id: ""                # non-sensitive; or set OPENBAO_ROLE_ID env var (env takes priority)
# secret_id_env: OPENBAO_SECRET_ID   # name of env var holding secret_id (never store value here)
# secret_id_file: ""         # optional: path to file containing secret_id (e.g. /run/secrets/...)
# E-05: Kubernetes auth — use pod service account JWT (no static credentials)
# To enable: set auth_method to kubernetes and configure k8s_role.
# The JWT is automatically read from the pod mount — no k8s_jwt_path change needed
# in standard Kubernetes deployments.
#
# auth_method: kubernetes
# k8s_role: ""          # required: name of the OpenBao Kubernetes auth role
# k8s_jwt_path: "/var/run/secrets/kubernetes.io/serviceaccount/token"  # default K8s SA token path
# k8s_mount_path: "kubernetes"  # default OpenBao K8s auth mount path
mount_point: secret
secrets_path: agentzero
tls_verify: true
tls_ca_cert: ""
timeout: 10.0
cache_ttl: 300
retry_attempts: 3
circuit_breaker_threshold: 5
circuit_breaker_recovery: 60
fallback_to_env: true
hard_fail_on_unavailable: true

# Namespace support (OpenBao 2.5.x OSS — confirmed working)
# Empty string = root namespace (default, backwards compatible)
vault_namespace: ""

# Bootstrap token file path (preferred over inline token for production)
# If set, token is read from this file at startup (chmod 600 recommended)
# Falls back to inline vault_token config value if empty or file missing
vault_token_file: ""

# Surface A — Plugin config secret field interception
# fnmatch patterns matched against plugin config dict keys (case-insensitive)
# Matched fields containing string values are extracted to OpenBao on save
secret_field_patterns:
  - "*key*"
  - "*token*"
  - "*secret*"
  - "*password*"
  - "*auth*"

# Surface B — MCP server header scan patterns
# Header keys in mcpServers[*].headers matching these names are extracted to OpenBao
mcp_header_scan_patterns:
  - "Authorization"
  - "X-API-Key"
  - "X-Auth-Token"

# Surface B — explicit MCP file scan targets (never wildcards — must be explicit)
mcp_scan_paths:
  - "**/mcp_servers.json"
  - "**/.a0proj/mcp_servers.json"

# Cross-plugin secret discovery — POST /api/openbao/sync-plugins
# Set false to disable the sync endpoint entirely (useful in hardened prod environments)
plugin_sync_enabled: true  # AC-02: plugin_sync_enabled flag

# Propagate Placeholders -- replace plaintext secret values with $bao:KEY refs
propagate_enabled: true

# Path to the secrets registry YAML file (empty = auto-derive from project root)
# Override via OPENBAO_REGISTRY_PATH environment variable
# Satisfies: AC-10 (REM-017)
registry_path: ""

# Filesystem root for .env file scan during bootstrap (env_scan source)
# Satisfies: AC-10 (REM-017)
env_scan_root: "/a0"

# Keys to inject into os.environ before code_execution_tool runs.
# Agents can then reference these as os.environ["KEY"] (python),
# process.env.KEY (nodejs), or $KEY (terminal).
# Add any secret name from the OpenBao secrets_path here.
terminal_secrets:
  - API_KEY_ZAI_CODING
  - API_KEY_OPENAI
  - API_KEY_OPENROUTER
  - OPENROUTER_API_KEY
  - API_KEY_A0_VENICE
  - API_KEY_STRAICO
  - GH_TOKEN
  - GITEA_TOKEN
  - OPENPROJECT_API_KEY
