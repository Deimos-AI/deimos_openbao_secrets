<html>
<head>
    <title>Deimos OpenBao Secrets</title>
    <style>
        /* Accent variants layered on btn-field (dark glass base) */
        .btn-field.btn-action {
            border-color: rgba(100, 180, 255, 0.25) !important;
            box-shadow: inset 0 0 6px rgba(100, 180, 255, 0.08);
        }
        .btn-field.btn-action:hover {
            border-color: rgba(100, 180, 255, 0.45) !important;
            box-shadow: inset 0 0 10px rgba(100, 180, 255, 0.15);
        }
        .btn-field.btn-confirm {
            border-color: rgba(76, 175, 80, 0.2) !important;
            box-shadow: inset 0 0 6px rgba(76, 175, 80, 0.06);
        }
        .btn-field.btn-confirm:hover {
            border-color: rgba(76, 175, 80, 0.45) !important;
            box-shadow: inset 0 0 10px rgba(76, 175, 80, 0.15);
        }
        .btn-field.btn-undo {
            border-color: rgba(255, 193, 7, 0.2) !important;
            box-shadow: inset 0 0 6px rgba(255, 193, 7, 0.06);
        }
        .btn-field.btn-undo:hover {
            border-color: rgba(255, 193, 7, 0.45) !important;
            box-shadow: inset 0 0 10px rgba(255, 193, 7, 0.15);
        }
    </style>
</head>
<body>
    <div x-data>
        <template x-if="config">
            <div>
                <div class="section-title">
                    <a href="https://deimosai.com/agentic-organisation" target="_blank"
                       style="text-decoration:none; margin-right:6px;" title="Deimos Agentic Organisation">
                        &#127760;
                    </a>
                    Deimos OpenBao Plugin Settings
                </div>
                <div class="section-description">
                    Replaces Agent Zero's secrets management with <a href="https://openbao.org" target="_blank">OpenBao</a> KV v2.
                    Credentials should be set as <strong>Docker environment variables</strong>
                    (e.g., <code>-e OPENBAO_TOKEN=...</code> in your <code>docker-compose.yml</code>).
                </div>

                <!-- Enable / Disable -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Enable OpenBao Backend</div>
                        <div class="field-description">
                            When enabled, all secrets are sourced from OpenBao instead of <code>.env</code> files.
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.enabled" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <!-- URL -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">OpenBao URL</div>
                        <div class="field-description">
                            Full URL to your OpenBao server including protocol and port.
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="text" x-model="config.url" placeholder="http://127.0.0.1:8200" />
                    </div>
                </div>

                <!-- Auth Method -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Authentication Method</div>
                        <div class="field-description">
                            <b>AppRole</b> (recommended): Machine-to-machine auth for production. Set <code>OPENBAO_ROLE_ID</code> and <code>OPENBAO_SECRET_ID</code> as Docker env vars.<br>
                            <b>Token</b> (dev only): Direct token auth. Set <code>OPENBAO_TOKEN</code> as Docker env var.
                        </div>
                    </div>
                    <div class="field-control">
                        <select x-model="config.auth_method">
                            <option value="approle">AppRole (recommended)</option>
                            <option value="token">Token (dev only)</option>
                        </select>
                    </div>
                </div>

                <!-- AppRole Credentials (shown when auth_method=approle) -->
                <div x-show="config.auth_method === 'approle'" x-transition>
                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Role ID</div>
                            <div class="field-description">
                                Non-sensitive AppRole role identifier. Env var <code>OPENBAO_ROLE_ID</code> takes priority if set.
                            </div>
                        </div>
                        <div class="field-control">
                            <input type="text" x-model="config.role_id"
                                   placeholder="or set OPENBAO_ROLE_ID env var" />
                        </div>
                    </div>
                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Secret ID Env Var Name</div>
                            <div class="field-description">
                                Name of the environment variable holding the <code>secret_id</code>.
                                <strong>Never enter the secret_id value here</strong> — use an env var.
                            </div>
                        </div>
                        <div class="field-control">
                            <input type="text" x-model="config.secret_id_env"
                                   placeholder="OPENBAO_SECRET_ID" />
                        </div>
                    </div>
                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Secret ID File Path</div>
                            <div class="field-description">
                                Optional: path to a file containing the <code>secret_id</code>.
                                Used when env var is absent. Recommended: <code>chmod 600</code>.
                            </div>
                        </div>
                        <div class="field-control">
                            <input type="text" x-model="config.secret_id_file"
                                   placeholder="/run/secrets/openbao_secret_id" />
                        </div>
                    </div>
                </div>


                <!-- Mount Point -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Mount Point</div>
                        <div class="field-description">
                            The KV v2 secrets engine mount path &mdash; the "volume" where your secrets engine lives.
                            Most installations use <code>secret</code>.
                            <br><em>Enable with:</em> <code>bao secrets enable -path=secret kv-v2</code>
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="text" x-model="config.mount_point" placeholder="secret" />
                    </div>
                </div>

                <!-- Secrets Path -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Secrets Path</div>
                        <div class="field-description">
                            KV path within the mount where A0 secrets are stored as key-value pairs.
                            <br><em>Write secrets:</em> <code>bao kv put secret/<b>agentzero</b> API_KEY=sk-...</code>
                            <br><em>Multi-env:</em> <code>agentzero/prod</code>, <code>agentzero/staging</code>
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="text" x-model="config.secrets_path" placeholder="agentzero" />
                    </div>
                </div>

                <!-- Fallback to .env -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Fallback to .env Files</div>
                        <div class="field-description">
                            When enabled, falls back to <code>.env</code> files if OpenBao is unreachable.
                            Disable for strict mode &mdash; secrets <em>only</em> from OpenBao.
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.fallback_to_env" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <!-- Fallback gating: opt-in error suppression -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Hard Fail on Unavailable</div>
                        <div class="field-description">
                            <strong>On by default (recommended).</strong>
                            When <em>on</em>, Agent Zero raises an error immediately if OpenBao is
                            unreachable &mdash; secrets are never silently sourced from <code>.env</code>.
                            Disable only if you explicitly want graceful degradation to <code>.env</code>
                            when OpenBao is unavailable.
                            <br><em>Disabling requires <strong>Fallback to .env Files</strong> to also be enabled.</em>
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.hard_fail_on_unavailable" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <!-- TLS -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Verify TLS Certificates</div>
                        <div class="field-description">Disable only for development.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.tls_verify" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">CA Certificate Path</div>
                        <div class="field-description">Custom CA bundle. Leave empty for system defaults.</div>
                    </div>
                    <div class="field-control">
                        <input type="text" x-model="config.tls_ca_cert" placeholder="/path/to/ca-bundle.crt" />
                    </div>
                </div>

                <!-- Tuning -->
                <div class="field">
                    <div class="field-label"><div class="field-title">HTTP Timeout (seconds)</div></div>
                    <div class="field-control">
                        <input type="number" min="1" max="120" step="0.5" x-model.number="config.timeout" />
                    </div>
                </div>
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Cache TTL (seconds)</div>
                        <div class="field-description">How long to cache secrets. 0 = no caching.</div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="0" max="3600" x-model.number="config.cache_ttl" />
                    </div>
                </div>
                <div class="field">
                    <div class="field-label"><div class="field-title">Retry Attempts</div></div>
                    <div class="field-control">
                        <input type="number" min="0" max="10" x-model.number="config.retry_attempts" />
                    </div>
                </div>
                <div class="field">
                    <div class="field-label"><div class="field-title">Circuit Breaker Threshold</div></div>
                    <div class="field-control">
                        <input type="number" min="1" max="50" x-model.number="config.circuit_breaker_threshold" />
                    </div>
                </div>
                <div class="field">
                    <div class="field-label"><div class="field-title">Circuit Breaker Recovery (s)</div></div>
                    <div class="field-control">
                        <input type="number" min="5" max="600" x-model.number="config.circuit_breaker_recovery" />
                    </div>
                </div>

                <!-- Test Connection -->
                <div class="field" x-data="{ testResult: ''  }">
                    <div class="field-label">
                        <div class="field-title">Connection Test</div>
                        <div class="field-description">
                            <span x-show="testResult" x-text="testResult" style="font-weight:bold;"></span>
                        </div>
                    </div>
                    <div class="field-control">
                        <button class="btn btn-field" @click="
                            testResult = 'Testing...';
                            fetch('/api/plugins/deimos_openbao_secrets/health', {
                                method: 'POST',
                                credentials: 'same-origin',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    config: {
                                        url: config.url,
                                        timeout: config.timeout,
                                        tls_verify: config.tls_verify,
                                        tls_ca_cert: config.tls_ca_cert
                                    }
                                })
                            })
                            .then(r => r.json())
                            .then(d => {
                                if (d.ok) {
                                    let s = d.data?.status || 'OK';
                                    let auth = d.data?.authenticated ? '' : ' (NOT AUTHENTICATED)';
                                    let extra = d.data?.auth_error ? ' - ' + d.data.auth_error : '';
                                    testResult = (d.data?.authenticated ? '2705 ' : '26a0Fe0f ') + s + auth + extra;
                                } else {
                                    let msg = d.error || 'Failed';
                                    if (msg.includes('Connection refused') || msg.includes('NewConnectionError')) msg = 'Cannot reach OpenBao. Check URL and ensure it is running.';
                                    else if (msg.includes('timed out')) msg = 'OpenBao did not respond in time. Check network.';
                                    else if (msg.includes('SSL') || msg.includes('certificate')) msg = 'TLS error. Check CA cert or disable verify for dev.';
                                    testResult = '❌ ' + msg;
                                }
                            })
                            .catch(e => { testResult = '❌ ' + e.message; });
                        ">Test Connection</button>
                    </div>
                </div>

                <!-- ============= SECRETS MANAGEMENT ============= -->
                <div x-show="config.enabled && config.url" x-data="secretsEditorData()" x-effect="if(config.enabled && config.url && !loading && secrets.length === 0 && !error) doRefresh()">

                    <div class="section-title" style="margin-top:24px;">Secrets Management</div>
                    <div class="section-description">
                        Manage secrets stored in OpenBao. Values are <strong>never exposed to the AI agent</strong>.
                    </div>

                    <div style="display:flex; gap:8px; margin:12px 0;">
                        <button class="btn btn-field" @click="doRefresh()">Refresh</button>
                        <button class="btn btn-field" @click="toggleAdd()">Add Secret</button>
                        <button class="btn btn-field" @click="toggleBulk()">Bulk Import</button>
                    </div>



                    <!-- REM-022 (AC-03): errors shown via toastFrontendError, not inline -->
                    <div x-show="loading" style="color:#888; margin:8px 0;">Loading secrets...</div>

                    <!-- Add New -->
                    <div x-show="showAdd" style="background:rgba(255,255,255,0.05); padding:12px; border-radius:8px; margin:8px 0;">
                        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                            <input type="text" x-model="newKey" placeholder="KEY_NAME" style="flex:1; min-width:150px;" />
                            <input type="password" x-model="newValue" placeholder="secret value" style="flex:2; min-width:200px;" />
                            <button class="btn btn-field" @click="addNew()">Save</button>
                            <button class="btn btn-field" @click="cancelAdd()">Cancel</button>
                        </div>
                    </div>

                    <!-- Bulk Import -->
                    <div x-show="showBulk" style="background:rgba(255,255,255,0.05); padding:12px; border-radius:8px; margin:8px 0;">
                        <div style="margin-bottom:8px; color:#aaa; font-size:0.9em;">
                            Enter secrets as KEY=VALUE pairs, one per line. Lines starting with # are ignored.
                        </div>
                        <textarea x-model="bulkText" placeholder="API_KEY=sk-abc123
DB_PASSWORD=hunter2
# This is a comment" rows="8" style="width:100%; font-family:monospace; resize:vertical;"></textarea>
                        <div style="display:flex; gap:8px; margin-top:8px;">
                            <button class="btn btn-field" @click="doBulkSet()">Import All</button>
                            <button class="btn btn-field" @click="cancelBulk()">Cancel</button>
                        </div>
                    </div>

                    <!-- Secrets List -->
                    <div x-show="!loading && secrets.length > 0">
                        <template x-for="secret in secrets" :key="secret.key">
                            <div class="field">
                                <div class="field-label">
                                    <div class="field-title" x-text="secret.key" style="font-family:monospace;"></div>
                                </div>
                                <div class="field-control" style="display:flex; gap:6px; align-items:center;">
                                    <template x-if="!isEditing(secret.key)">
                                        <div style="display:flex; gap:6px; align-items:center; width:100%;">
                                            <span x-text="'***'" style="font-family:monospace; flex:1;"></span>
                                            <button class="btn btn-field" @click="startEdit(secret.key)" title="Edit">&#9998;</button>
                                            <button class="btn btn-field" @click="confirmDelete(secret.key)" title="Delete" style="color:#ff6b6b;">&#128465;</button>
                                        </div>
                                    </template>
                                    <template x-if="isEditing(secret.key)">
                                        <div style="display:flex; gap:6px; align-items:center; width:100%;">
                                            <input type="password" :value="getEditValue(secret.key)" @input="setEditValue(secret.key, $event.target.value)" placeholder="new value" style="flex:1;" />
                                            <button class="btn btn-field" @click="saveEdit(secret.key)">Save</button>
                                            <button class="btn btn-field" @click="cancelEdit(secret.key)">Cancel</button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div x-show="!loading && secrets.length === 0 && !error"
                         style="color:#888; margin:12px 0; font-style:italic;">
                        No secrets found. Click "Add Secret" to create one.
                    </div>
                </div>


                <!-- ============= MCP CREDENTIAL ROTATION (G-05) ============= -->
                <div x-data="{ mcpRefreshing: false, mcpResult: '', mcpOk: true }" style="margin-top:24px;">
                    <div class="section-title">MCP Credential Rotation</div>
                    <div class="section-description">
                        Re-fetches live credentials from OpenBao and reconnects MCP servers.
                        Use after rotating secrets in OpenBao. Files on disk keep their
                        <code>&#x27E6;bao:v1:&#x27E7;</code> placeholders &mdash;
                        only the running MCP client is updated with fresh values.
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Refresh MCP Credentials</div>
                            <div class="field-description">
                                <span x-show="mcpResult"
                                      :style="mcpOk ? 'color:#4CAF50;' : 'color:#ff6b6b;'"
                                      x-text="mcpResult"></span>
                            </div>
                        </div>
                        <div class="field-control">
                            <button class="btn btn-field" :disabled="mcpRefreshing"
                                @click="
                                    mcpRefreshing = true; mcpResult = 'Refreshing...';
                                    fetch('/api/plugins/deimos_openbao_secrets/rotate_mcp', {
                                        method: 'POST',
                                        credentials: 'same-origin',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({})
                                    })
                                    .then(r => r.json())
                                    .then(d => {
                                        mcpRefreshing = false; mcpOk = d.success;
                                        mcpResult = d.success
                                            ? ('✅ ' + (d.message || 'Done'))
                                            : ('❌ ' + (d.error || 'Failed'));
                                    })
                                    .catch(e => {
                                        mcpRefreshing = false; mcpOk = false;
                                        mcpResult = '❌ ' + e.message;
                                    });
                                "
                            >
                                <span x-show="!mcpRefreshing">&#x21BB; Refresh MCP Credentials</span>
                                <span x-show="mcpRefreshing">Refreshing&hellip;</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Discovery & Migration Tools (collapsible) -->
                <div x-data="{ toolsExpanded: false }">
                    <div style="cursor:pointer; display:flex; align-items:center; gap:8px; padding:8px 0; border-top:1px solid rgba(255,255,255,0.1); margin-top:24px;"
                         @click="toolsExpanded = !toolsExpanded">
                        <span class="material-symbols-outlined"
                              :style="toolsExpanded ? 'transform:rotate(90deg)' : ''"
                              style="font-size:18px; transition:transform 0.15s ease;">chevron_right</span>
                        <span class="field-title" style="font-size:0.95rem;">Discovery &amp; Migration Tools</span>
                        <span style="opacity:0.4; font-size:0.8rem; margin-left:4px;">(click to expand)</span>
                    </div>
                    <div x-show="toolsExpanded" x-transition.opacity>

                        <!-- REM-017: Secrets Registry Bootstrap section (AC-14) -->
                        <div class="field">
                            <div class="field-label">
                                <div class="field-title">🗂 Secrets Registry</div>
                                <div class="field-description">Scan environment files, .a0proj directories, and MCP settings for declared secrets. Bootstraps the registry on first install. <span id="bootstrap-status">Checking registry…</span></div>
                            </div>
                            <div class="field-control">
                                <button id="btn-bootstrap-scan" class="btn btn-field btn-action"
                                        onclick="runBootstrapScan()">🔍 Run Bootstrap Scan</button>
                            </div>
                        </div>
                        <div id="bootstrap-result" class="mt-3" style="display:none;"></div>

                        <!-- Discover & Sync Plugin Secrets -->
                        <div class="field">
                            <div class="field-label">
                                <div class="field-title">🔌 Plugin Secret Sync</div>
                                <div class="field-description">Scan installed plugins for declared secrets and sync them to OpenBao.</div>
                            </div>
                            <div class="field-control">
                                <button id="btn-sync-plugins" class="btn btn-field btn-action"
                                        onclick="syncPlugins()">🔍 Discover &amp; Sync Plugin Secrets</button>
                            </div>
                        </div>
                        <div id="sync-plugins-result" class="mt-3" style="display:none;"></div>

                        <!-- E-03: Propagate Placeholders section (AC-27) -->
                        <div class="field">
                            <div class="field-label">
                                <div class="field-title">🔄 Propagate Placeholders</div>
                                <div class="field-description">Replace plaintext secret values with <code>$bao:KEY</code> references. Creates automatic backups. Undo available.</div>
                            </div>
                            <div class="field-control" style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                                <button id="btn-propagate-scan" class="btn btn-field btn-action"
                                        onclick="propagateScan()">🔍 Scan Targets</button>
                                <button id="btn-propagate-execute" class="btn btn-field btn-confirm"
                                        style="display:none;" onclick="propagateExecute()">✅ Propagate Selected</button>
                                <select id="propagate-undo-select" style="display:none; max-width:200px;">
                                    <option value="">-- Select backup --</option>
                                </select>
                                <button id="btn-propagate-undo" class="btn btn-field btn-undo"
                                        style="display:none;" onclick="propagateUndo()">↩ Undo</button>
                                <span id="propagate-spinner" style="display:none; color:#888; margin-left:8px;">⏳ Working...</span>
                            </div>
                        </div>

                        <!-- Target table (AC-27, AC-28) -->
                        <div id="propagate-targets" class="mt-3" style="display:none;">
                            <table style="width:100%; border-collapse:collapse; font-size:0.85em;">
                                <thead>
                                    <tr style="border-bottom:1px solid rgba(255,255,255,0.15);">
                                        <th style="text-align:left; padding:4px 8px;"><input type="checkbox" id="propagate-select-all" checked onchange="propagateToggleAll(this)" /></th>
                                        <th style="text-align:left; padding:4px 8px;">File</th>
                                        <th style="text-align:left; padding:4px 8px;">Field</th>
                                        <th style="text-align:left; padding:4px 8px;">Preview</th>
                                        <th style="text-align:left; padding:4px 8px;">Proposed</th>
                                    </tr>
                                </thead>
                                <tbody id="propagate-targets-body"></tbody>
                            </table>
                        </div>

                        <div id="propagate-result" class="mt-3" style="display:none;"></div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <script>
    window.secretsEditorData = function() {
        var API = '/api/plugins/deimos_openbao_secrets/secrets';
        var HEADERS = {'Content-Type': 'application/json'};

        return {
            secrets: [],
            loading: false,
            error: '',
            showAdd: false,
            newKey: '',
            newValue: '',
            _editing: {},
            _editValues: {},

            // REM-022 (AC-03): showError — toast-based error display
            showError: function(msg) {
                this.error = msg;
                if (window.toastFrontendError) window.toastFrontendError(msg, 'OpenBao Secrets');
            },

            isEditing: function(key) {
                return !!this._editing[key];
            },

            getEditValue: function(key) {
                return this._editValues[key] || '';
            },

            setEditValue: function(key, val) {
                this._editValues[key] = val;
            },

            toggleAdd: function() {
                this.showAdd = !this.showAdd;
            },

            cancelAdd: function() {
                this.showAdd = false;
                this.newKey = '';
                this.newValue = '';
            },

            doRefresh: function() {
                var self = this;
                self.loading = true;
                self.error = '';
                fetch('/api/plugins/deimos_openbao_secrets/secrets', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: HEADERS,
                    body: JSON.stringify({action: 'list'})
                })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.ok) self.secrets = d.secrets || [];
                    else self.showError(d.error || 'Failed to list secrets');
                    self.loading = false;
                })
                .catch(function(e) {
                    self.showError(e.message);
                    self.loading = false;
                });
            },


            startEdit: function(key) {
                this._editing[key] = true;
                this._editValues[key] = '';
            },

            cancelEdit: function(key) {
                delete this._editing[key];
                delete this._editValues[key];
            },

            saveEdit: function(key) {
                var val = this._editValues[key];
                if (!val) return;
                var self = this;
                self.error = '';
                fetch('/api/plugins/deimos_openbao_secrets/secrets', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: HEADERS,
                    body: JSON.stringify({action: 'set', pairs: [{key: key, value: val}]})
                })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.ok) {
                        self.cancelEdit(key);
                        self.doRefresh();
                    } else {
                        self.showError(d.error);
                    }
                })
                .catch(function(e) { self.showError(e.message); });
            },

            confirmDelete: function(key) {
                if (!window.confirm('Delete secret ' + key + '? This cannot be undone.')) return;
                var self = this;
                self.error = '';
                fetch('/api/plugins/deimos_openbao_secrets/secrets', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: HEADERS,
                    body: JSON.stringify({action: 'delete', key: key})
                })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.ok) self.doRefresh();
                    else self.showError(d.error);
                })
                .catch(function(e) { self.showError(e.message); });
            },

            showBulk: false,
            bulkText: '',

            toggleBulk: function() {
                this.showBulk = !this.showBulk;
            },

            cancelBulk: function() {
                this.showBulk = false;
                this.bulkText = '';
            },

            doBulkSet: function() {
                if (!this.bulkText.trim()) return;
                var self = this;
                self.error = '';
                fetch('/api/plugins/deimos_openbao_secrets/secrets', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: HEADERS,
                    body: JSON.stringify({action: 'bulk_set', text: self.bulkText})
                })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.ok) {
                        self.bulkText = ''; self.showBulk = false;
                        self.doRefresh();
                    } else {
                        self.showError(d.error);
                    }
                })
                .catch(function(e) { self.showError(e.message); });
            },

            addNew: function() {
                if (!this.newKey.trim()) return;
                var self = this;
                self.error = '';
                fetch('/api/plugins/deimos_openbao_secrets/secrets', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: HEADERS,
                    body: JSON.stringify({action: 'set', pairs: [{key: self.newKey.trim(), value: self.newValue}]})
                })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.ok) {
                        self.newKey = ''; self.newValue = ''; self.showAdd = false;
                        self.doRefresh();
                    } else {
                        self.showError(d.error);
                    }
                })
                .catch(function(e) { self.showError(e.message); });
            }
        };
    };

        async function syncPlugins() {
            const btn = document.getElementById('btn-sync-plugins');
            const resultDiv = document.getElementById('sync-plugins-result');
            btn.disabled = true;
            btn.textContent = '⏳ Scanning...';
            resultDiv.style.display = 'none';

            try {
                const resp = await fetch('/api/plugins/deimos_openbao_secrets/sync_plugins', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({})
                });
                const data = await resp.json();

                if (!data.ok) {
                    // REM-022 (AC-03): toast instead of inline error
                    if (window.toastFrontendError) window.toastFrontendError(data.error, 'Plugin Sync');
                    resultDiv.innerHTML = '';
                    return;
                }

                if (!data.plugins || data.plugins.length === 0) {
                    resultDiv.innerHTML =
                        '<div class="alert alert-info">No plugins declare secrets. ' +
                        'Add a <code>secrets:</code> field to a plugin.yaml to use this feature.</div>';
                    resultDiv.style.display = 'block';
                    return;
                }

                const STATUS_ICON  = {exists: '🟢', migrated: '🟡', missing: '🔴'};
                const STATUS_LABEL = {exists: 'exists', migrated: 'migrated', missing: 'missing'};

                let html = '<div class="accordion" id="syncPluginsAccordion">';
                data.plugins.forEach((plugin, idx) => {
                    const collapseId = `syncPlugin${idx}`;
                    const missingCount = plugin.secrets.filter(s => s.status === 'missing').length;
                    const badge = missingCount > 0
                        ? `<span class="badge bg-danger ms-2">${missingCount} missing</span>`
                        : '<span class="badge bg-success ms-2">all synced</span>';
                    const rows = plugin.secrets.map(s =>
                        `<tr>
                            <td><code>${s.key}</code></td>
                            <td>${STATUS_ICON[s.status] || '❓'} ${STATUS_LABEL[s.status] || s.status}</td>
                            <td>${s.description || ''}</td>
                        </tr>`
                    ).join('');
                    html += `
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button ${idx > 0 ? 'collapsed' : ''}" type="button"
                                    data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                                ${plugin.name} ${badge}
                            </button>
                        </h2>
                        <div id="${collapseId}" class="accordion-collapse collapse ${idx === 0 ? 'show' : ''}">
                            <div class="accordion-body">
                                <table class="table table-sm">
                                    <thead><tr><th>Key</th><th>Status</th><th>Description</th></tr></thead>
                                    <tbody>${rows}</tbody>
                                </table>
                            </div>
                        </div>
                    </div>`;
                });
                html += '</div>';
                resultDiv.innerHTML = html;
                resultDiv.style.display = 'block';
            } catch (err) {
                // REM-022 (AC-03): toast instead of inline error
                if (window.toastFrontendError) window.toastFrontendError('Request failed: ' + err, 'Plugin Sync');
                resultDiv.innerHTML = '';
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 Discover & Sync Plugin Secrets';
            }
        }
        // REM-017: Secrets Registry Bootstrap functions (AC-14)
        async function checkBootstrapStatus() {
            const statusDiv = document.getElementById('bootstrap-status');
            if (!statusDiv) return;
            try {
                const resp = await fetch('/api/plugins/deimos_openbao_secrets/bootstrap', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'status'  })
                });
                const data = await resp.json();
                if (data.ok) {
                    if (data.bootstrap_needed) {
                        statusDiv.textContent = 'Registry absent — bootstrap scan needed';
                        statusDiv.className = 'text-warning small mb-2';
                    } else {
                        statusDiv.textContent = `Registry present — ${data.entry_count} entries`;
                        statusDiv.className = 'text-success small mb-2';
                    }
                } else {
                    statusDiv.textContent = `Status error: ${data.error}`;
                    statusDiv.className = 'text-danger small mb-2';
                }
            } catch (err) {
                statusDiv.textContent = `Status check failed: ${err}`;
                statusDiv.className = 'text-danger small mb-2';
            }
        }

        async function runBootstrapScan() {
            const btn = document.getElementById('btn-bootstrap-scan');
            const resultDiv = document.getElementById('bootstrap-result');
            btn.disabled = true;
            btn.textContent = '⏳ Scanning...';
            resultDiv.style.display = 'none';

            const SOURCES = {
                env_scan:    {label: '.env Files',          icon: '📤'},
                a0proj_scan: {label: '.a0proj Directories', icon: '📁'},
                mcp_scan:    {label: 'MCP Settings',        icon: '🔌'}
            };
            const STATUS_ICON = {
                discovered: '🔵',
                migrated:   '🟡',
                exists:     '🟢',
                missing:    '🔴',
                error:      '❌'
            };

            try {
                const resp = await fetch('/api/plugins/deimos_openbao_secrets/bootstrap', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'scan'})
                });
                const data = await resp.json();

                if (!data.ok) {
                    // REM-022 (AC-03): toast instead of inline error
                    if (window.toastFrontendError) window.toastFrontendError(data.error, 'Bootstrap Scan');
                    resultDiv.innerHTML = '';
                    return;
                }

                if (!data.entries || data.entries.length === 0) {
                    resultDiv.innerHTML = '<div class="alert alert-info">No secrets discovered during scan.</div>';
                    resultDiv.style.display = 'block';
                    return;
                }

                // Group entries by source
                const grouped = {};
                data.entries.forEach(e => {
                    if (!grouped[e.source]) grouped[e.source] = [];
                    grouped[e.source].push(e);
                });

                // Build Bootstrap 5 accordion -- AC-14 (same CSS pattern as syncPlugins)
                let html = '<div class="accordion" id="bootstrapAccordion">'
                Object.entries(grouped).forEach(([src, items], idx) => {
                    const collapseId = `bootstrapSrc${idx}`;
                    const srcMeta = SOURCES[src] || {label: src, icon: '?'};
                    const rows = items.map(e =>
                        `<tr><td><code>${e.key}</code></td>` +
                        `<td>${STATUS_ICON[e.status] || '?'} ${e.status}</td>` +
                        `<td>${e.context}</td></tr>`
                    ).join('');
                    html += `
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button ${idx > 0 ? 'collapsed' : ''}'
                                    type="button" data-bs-toggle="collapse"
                                    data-bs-target="#${collapseId}">
                                ${srcMeta.icon} ${srcMeta.label}
                                <span class="badge bg-secondary ms-2">${items.length}</span>
                            </button>
                        </h2>
                        <div id="${collapseId}" class="accordion-collapse collapse ${idx === 0 ? 'show' : ''}">
                            <div class="accordion-body">
                                <table class="table table-sm">
                                    <thead><tr><th>Key</th><th>Status</th><th>Context</th></tr></thead>
                                    <tbody>${rows}</tbody>
                                </table>
                            </div>
                        </div>
                    </div>`;
                });
                html += '</div>';
                resultDiv.innerHTML = html;
                resultDiv.style.display = 'block';
                checkBootstrapStatus();
            } catch (err) {
                // REM-022 (AC-03): toast instead of inline error
                if (window.toastFrontendError) window.toastFrontendError('Request failed: ' + err, 'Bootstrap Scan');
                resultDiv.innerHTML = '';
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 Run Bootstrap Scan';
            }
        }

        // AC-14: call on page load
        checkBootstrapStatus();

        // ================================================================
        // E-03: Propagate Placeholders functions (AC-27 through AC-30)
        // ================================================================

        let _propagateTargets = [];

        function propagateToggleAll(checkbox) {
            document.querySelectorAll('.propagate-target-check').forEach(cb => {
                cb.checked = checkbox.checked;
            });
        }

        async function propagateScan() {
            const btn = document.getElementById('btn-propagate-scan');
            const spinner = document.getElementById('propagate-spinner');
            const targetsDiv = document.getElementById('propagate-targets');
            const execBtn = document.getElementById('btn-propagate-execute');
            const resultDiv = document.getElementById('propagate-result');
            const undoSelect = document.getElementById('propagate-undo-select');
            const undoBtn = document.getElementById('btn-propagate-undo');

            btn.disabled = true;
            spinner.style.display = 'inline';
            targetsDiv.style.display = 'none';
            resultDiv.style.display = 'none';

            try {
                const resp = await fetch('/api/plugins/deimos_openbao_secrets/propagate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'scan'})
                });
                const data = await resp.json();

                if (!data.ok) {
                    if (window.toastFrontendError) window.toastFrontendError(data.error, 'Propagate Scan');
                    return;
                }

                _propagateTargets = data.targets || [];

                if (_propagateTargets.length === 0) {
                    resultDiv.innerHTML = '<div class="alert alert-info">No plaintext secrets found that need propagation.</div>';
                    resultDiv.style.display = 'block';
                    execBtn.style.display = 'none';
                    return;
                }

                const tbody = document.getElementById('propagate-targets-body');
                tbody.innerHTML = '';
                _propagateTargets.forEach(t => {
                    const tr = document.createElement('tr');
                    tr.style.borderBottom = '1px solid rgba(255,255,255,0.08)';
                    tr.innerHTML =
                        '<td style="padding:4px 8px;"><input type="checkbox" class="propagate-target-check" data-target-id="' + t.id + '" checked /></td>' +
                        '<td style="padding:4px 8px; font-family:monospace; font-size:0.8em;">' + t.target_type + '</td>' +
                        '<td style="padding:4px 8px; font-family:monospace;">' + t.field_name + '</td>' +
                        '<td style="padding:4px 8px; font-family:monospace; color:#aaa;">' + t.current_preview + '</td>' +
                        '<td style="padding:4px 8px; font-family:monospace; color:#4CAF50;">' + t.proposed_ref + '</td>';
                    tbody.appendChild(tr);
                });

                targetsDiv.style.display = 'block';
                execBtn.style.display = 'inline-block';
                resultDiv.style.display = 'none';

                populateUndoDropdown();
            } catch (err) {
                if (window.toastFrontendError) window.toastFrontendError('Scan failed: ' + err, 'Propagate');
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        }

        async function propagateExecute() {
            const spinner = document.getElementById('propagate-spinner');
            const resultDiv = document.getElementById('propagate-result');
            const targetsDiv = document.getElementById('propagate-targets');
            const execBtn = document.getElementById('btn-propagate-execute');

            const selectedIds = [];
            document.querySelectorAll('.propagate-target-check:checked').forEach(cb => {
                selectedIds.push(cb.dataset.targetId);
            });

            if (selectedIds.length === 0) {
                if (window.toastFrontendError) window.toastFrontendError('No targets selected', 'Propagate');
                return;
            }

            execBtn.disabled = true;
            spinner.style.display = 'inline';

            try {
                const resp = await fetch('/api/plugins/deimos_openbao_secrets/propagate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'propagate', targets: selectedIds})
                });
                const data = await resp.json();

                if (data.ok) {
                    resultDiv.innerHTML = '<div class="alert alert-success">Propagated ' + data.propagated + ' secret(s). Backups created.</div>';
                } else {
                    resultDiv.innerHTML = '<div class="alert alert-danger">Propagation failed: ' + (data.error || data.errors.join(', ')) + '</div>';
                }
                resultDiv.style.display = 'block';
                targetsDiv.style.display = 'none';
                execBtn.style.display = 'none';
                populateUndoDropdown();
            } catch (err) {
                if (window.toastFrontendError) window.toastFrontendError('Propagate failed: ' + err, 'Propagate');
            } finally {
                execBtn.disabled = false;
                spinner.style.display = 'none';
            }
        }

        async function propagateUndo() {
            const undoSelect = document.getElementById('propagate-undo-select');
            const spinner = document.getElementById('propagate-spinner');
            const resultDiv = document.getElementById('propagate-result');
            const backupId = undoSelect.value;

            if (!backupId) {
                if (window.toastFrontendError) window.toastFrontendError('Select a backup first', 'Propagate Undo');
                return;
            }

            spinner.style.display = 'inline';

            try {
                const resp = await fetch('/api/plugins/deimos_openbao_secrets/propagate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'undo', backup_id: backupId})
                });
                const data = await resp.json();

                if (data.ok) {
                    resultDiv.innerHTML = '<div class="alert alert-success">Restored ' + (data.restored || 0) + ' file(s) from backup.</div>';
                } else {
                    resultDiv.innerHTML = '<div class="alert alert-danger">Undo failed: ' + (data.error || 'unknown error') + '</div>';
                }
                resultDiv.style.display = 'block';
                populateUndoDropdown();
            } catch (err) {
                if (window.toastFrontendError) window.toastFrontendError('Undo failed: ' + err, 'Propagate');
            } finally {
                spinner.style.display = 'none';
            }
        }

        async function populateUndoDropdown() {
            const undoSelect = document.getElementById('propagate-undo-select');
            const undoBtn = document.getElementById('btn-propagate-undo');

            try {
                const resp = await fetch('/api/plugins/deimos_openbao_secrets/propagate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'list_backups'})
                });
                const data = await resp.json();

                if (data.ok && data.backups && data.backups.length > 0) {
                    undoSelect.innerHTML = '<option value="">-- Select backup --</option>';
                    data.backups.forEach(b => {
                        const opt = document.createElement('option');
                        opt.value = b.timestamp;
                        opt.textContent = b.timestamp + ' (' + b.file_count + ' file(s))';
                        undoSelect.appendChild(opt);
                    });
                    undoSelect.style.display = 'inline-block';
                    undoBtn.style.display = 'inline-block';
                } else {
                    undoSelect.style.display = 'none';
                    undoBtn.style.display = 'none';
                }
            } catch (err) {
                undoSelect.style.display = 'none';
                undoBtn.style.display = 'none';
            }
        }


    </script>
